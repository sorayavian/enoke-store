# ============================================================================
# Evolution API (WhatsApp) — stack local para desenvolvimento/teste.
#
# Sobe 3 serviços: Evolution + PostgreSQL + Redis.
# Uso:
#   cd enoke-store/evolution
#   docker compose up -d
#   → abra http://localhost:8080  (apikey no .env deste diretório)
#
# Para parar:   docker compose down
# Para zerar:   docker compose down -v   (apaga também os dados/sessão)
# ============================================================================

services:
  evolution-api:
    # Repositório atual do projeto (o antigo atendai/ parou na v2.2.3, que tem
    # o bug do loop de QR). A v2.3.7 inclui o fix da conexão inicial.
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      # ── Servidor ──
      - SERVER_URL=http://localhost:8080
      # Chave global de acesso à API (use a mesma em WHATSAPP_API_TOKEN do site).
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}

      # ── Sessão / Baileys ──
      # Fixa uma versão atual do WhatsApp Web para evitar o loop de reconexão
      # que impede o QR de ser gerado (bug conhecido com a versão padrão antiga).
      - CONFIG_SESSION_PHONE_CLIENT=Enoke
      - CONFIG_SESSION_PHONE_NAME=Chrome
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1023204200

      # ── Banco (Postgres) ──
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution@postgres:5432/evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true

      # ── Cache (Redis) ──
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_LOCAL_ENABLED=false

      # ── Webhook global (opcional; também dá para configurar por instância) ──
      # Aponta para o webhook do site. Em dev local, ver evolution/README.md
      # (precisa de um túnel para o localhost:3000 ser acessível pela Evolution).
      - WEBHOOK_GLOBAL_ENABLED=false
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    container_name: evolution_postgres
    restart: always
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution
      - POSTGRES_DB=evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: evolution_redis
    restart: always
    volumes:
      - evolution_redisdata:/data

volumes:
  evolution_pgdata:
  evolution_redisdata:
